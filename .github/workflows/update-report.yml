name: Update Anticipation Report

# Refreshes the weekly report and commits the new snapshot.
# Runs every Monday at 09:00 UTC, or on demand from the Actions tab.
on:
  schedule:
    - cron: '0 9 * * 1'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npm ci || npm install

      # Pulls live data when the secrets are configured; falls back to the
      # built-in sample catalog if they're missing.
      - name: Build report
        env:
          TRAKT_CLIENT_ID: ${{ secrets.TRAKT_CLIENT_ID }}
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
          REPORT_LIMIT: ${{ vars.REPORT_LIMIT || '25' }}
        run: npm run fetch

      - name: Commit new snapshot
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Update anticipation report ($(date -u +%Y-%m-%d))"
            git push
          fi
